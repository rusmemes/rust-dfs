syntax = "proto3";

package publish;

import "google/protobuf/empty.proto";

service PublishService {
    rpc PublishFile (PublishFileRequest) returns (PublishFileResponse);
}

message PublishFileRequest {
    string file_path = 1;
    bool public = 2;
}

message PublishFileResponse {
    google.protobuf.Empty ok = 1;
}
